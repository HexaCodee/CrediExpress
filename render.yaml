      - key: PORT
        value: "3004"
      - key: NODE_ENV
        value: production
      - key: URI_MONGODB
        sync: false
      - key: JWT_ISSUER
        value: CrediExpress
      - key: JWT_AUDIENCE
        value: CrediExpress
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://client-admin-g6ox.onrender.com

  - type: web
    name: bank-service
    runtime: docker
    dockerfilePath: crediexpress-stack/dockerfiles/render/Dockerfile.bank-service
    dockerContext: bank-service
    plan: free
    healthCheckPath: /crediExpress/v1/health
    envVars:
      - key: PORT
        value: "3006"
      - key: NODE_ENV
        value: production
      - key: URI_MONGODB
        sync: false
      - key: JWT_ISSUER
        value: CrediExpress
      - key: JWT_AUDIENCE
        value: CrediExpress
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://client-admin-g6ox.onrender.com

  - type: web
    name: currency-conversion-service
