  - type: web
    name: product-currency-service
    runtime: docker
    dockerfilePath: crediexpress-stack/dockerfiles/render/Dockerfile.product-currency-service
    dockerContext: product-currency-service
    plan: free
    healthCheckPath: /crediExpress/v1/health
