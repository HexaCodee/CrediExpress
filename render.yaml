services:
  # --- Frontend web (admin) ---

  - type: web
    name: client-admin
    runtime: static
    rootDir: client-admin
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_AUTH_URL
        value: https://log-service-uv8n.onrender.com/api/v1
      - key: VITE_ADMIN_URL
        value: https://auth-service-dhi5.onrender.com/api/v1
      - key: VITE_ACCOUNT_TYPE_URL
        value: https://account-type-service.onrender.com/crediExpress/v1
      - key: VITE_BANK_URL
        value: https://bank-service-bavc.onrender.com/crediExpress/v1
      - key: VITE_CORE_BANKING_URL
        value: https://core-banking-service-agzj.onrender.com/crediExpress/v1
      - key: VITE_CURRENCY_CONVERSION_URL
        value: https://currency-conversion-service-voew.onrender.com/crediExpress/v1

  # --- Servicios .NET ---

  - type: web
    name: auth-service
    runtime: docker
    dockerfilePath: crediexpress-stack/dockerfiles/render/Dockerfile.auth-service
    dockerContext: authentication-service/auth-service
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: PORT
        value: 5222
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: AppSettings__FrontendUrl
        sync: false
      - key: AppSettings__AuthServiceUrl
        sync: false
      - key: JwtSettings__SecretKey
        sync: false
      - key: JwtSettings__Issuer
        value: CrediExpress
      - key: JwtSettings__Audience
        value: CrediExpress
      - key: JwtSettings__ExpirationMinutes
        value: "60"
      - key: SmtpSettings__Enabled
        value: "true"
      - key: SmtpSettings__Host
        value: smtp.gmail.com
      - key: SmtpSettings__Port
        value: "465"
      - key: SmtpSettings__EnableSsl
        value: "true"
      - key: SmtpSettings__UseImplicitSsl
        value: "true"
      - key: SmtpSettings__Username
        sync: false
      - key: SmtpSettings__Password
        sync: false
      - key: SmtpSettings__FromEmail
        sync: false
      - key: SmtpSettings__FromName
        value: CrediExpress Soporte
      - key: CloudinarySettings__CloudName
        sync: false
      - key: CloudinarySettings__ApiKey
        sync: false
      - key: CloudinarySettings__ApiSecret
        sync: false
      - key: CloudinarySettings__BaseUrl
        sync: false
      - key: CloudinarySettings__Folder
        value: auth_crediexpress/profiles
      - key: CloudinarySettings__DefaultAvatarPath
        value: avatarDefault.png

  - type: web
    name: log-service
    runtime: docker
    dockerfilePath: crediexpress-stack/dockerfiles/render/Dockerfile.log-service
    dockerContext: login-service/log-service
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: PORT
        value: 5062
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: AppSettings__FrontendUrl
        sync: false
      - key: JwtSettings__SecretKey
        sync: false
      - key: JwtSettings__Issuer
        value: CrediExpress
      - key: JwtSettings__Audience
        value: CrediExpress
      - key: JwtSettings__ExpirationMinutes
        value: "60"
      - key: SmtpSettings__Enabled
        value: "true"
      - key: SmtpSettings__Host
        value: smtp.gmail.com
      - key: SmtpSettings__Port
        value: "465"
      - key: SmtpSettings__EnableSsl
        value: "true"
      - key: SmtpSettings__UseImplicitSsl
        value: "true"
      - key: SmtpSettings__Username
        sync: false
      - key: SmtpSettings__Password
        sync: false
      - key: SmtpSettings__FromEmail
        sync: false
      - key: SmtpSettings__FromName
        value: CrediExpress Soporte
      - key: CloudinarySettings__CloudName
        sync: false
      - key: CloudinarySettings__ApiKey
        sync: false
      - key: CloudinarySettings__ApiSecret
        sync: false
      - key: CloudinarySettings__BaseUrl
        sync: false
      - key: CloudinarySettings__Folder
        value: auth_crediexpress/profiles
      - key: CloudinarySettings__DefaultAvatarPath
        value: avatarDefault.png

  # --- Microservicios Node ---

  - type: web
    name: role-node
    runtime: docker
    dockerfilePath: crediexpress-stack/dockerfiles/render/Dockerfile.role-node
    dockerContext: role-node
    plan: free
    healthCheckPath: /crediExpress/v1/health
    envVars:
      - key: PORT
        value: "3002"
      - key: NODE_ENV
        value: production
      - key: URI_MONGODB
        sync: false
      - key: JWT_ISSUER
        value: CrediExpress
      - key: JWT_AUDIENCE
        value: CrediExpress
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://client-admin-g6ox.onrender.com

  - type: web
    name: account-type-service
    runtime: docker
    dockerfilePath: crediexpress-stack/dockerfiles/render/Dockerfile.account-type-service
    dockerContext: accountType-service
    plan: free
    healthCheckPath: /crediExpress/v1/health
    envVars:
      - key: PORT
        value: "3003"
      - key: NODE_ENV
        value: production
      - key: URI_MONGODB
        sync: false
      - key: JWT_ISSUER
        value: CrediExpress
      - key: JWT_AUDIENCE
        value: CrediExpress
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://client-admin-g6ox.onrender.com

  - type: web
