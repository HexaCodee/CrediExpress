      - key: JWT_ISSUER
        value: CrediExpress
      - key: JWT_AUDIENCE
        value: CrediExpress
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://client-admin-g6ox.onrender.com
